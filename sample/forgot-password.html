<style>
    .glass-effect {
      background: rgba(18, 18, 18, 0.8);
      backdrop-filter: blur(20px);
    }
    .red-glow {
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.15);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>

<body class="bg-[#0A0A0A] text-on-surface font-body-md min-h-screen flex items-center justify-center p-gutter">
<!-- Background Decorative Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-1/4 -right-1/4 w-[600px] h-[600px] bg-red-600/10 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-1/4 -left-1/4 w-[600px] h-[600px] bg-red-900/10 rounded-full blur-[120px]"></div>
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/dark-matter.png')] opacity-20"></div>
</div>
<!-- Reset Password Container -->
<main class="relative z-10 w-full max-w-md">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-lg">
<div class="mb-sm">
<span class="material-symbols-outlined text-5xl text-[#FF0000]" data-icon="settings_input_antenna" style="font-variation-settings: 'FILL' 1;">settings_input_antenna</span>
</div>
<h2 class="font-display-lg text-display-lg text-[#FF0000] italic uppercase tracking-tighter">BEATSTREAM</h2>
</div>
<!-- Centered Card -->
<div class="surface-container-low border border-[#1A1A1A] rounded-xl p-lg shadow-2xl red-glow">
<div class="mb-lg">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Reset Password</h1>
<p class="font-body-md text-body-md text-on-surface-variant/70">
          Enter the email address associated with your account and we'll send you a link to reset your password.
        </p>
</div>
<!-- Form Section -->
<form action="#" class="space-y-md">
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface uppercase tracking-widest ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-[#FF0000] transition-colors" data-icon="alternate_email">alternate_email</span>
<input class="w-full bg-[#121212] border border-[#1A1A1A] text-on-surface rounded-lg py-4 pl-12 pr-4 focus:ring-1 focus:ring-[#FF0000] focus:border-[#FF0000] outline-none transition-all placeholder:text-gray-600" id="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<button class="w-full bg-[#FF0000] text-white font-headline-md text-headline-md py-4 rounded-full hover:scale-[1.03] active:scale-[0.97] transition-all shadow-[0_4px_20px_rgba(255,0,0,0.3)] hover:shadow-[0_4px_30px_rgba(255,0,0,0.5)] flex items-center justify-center gap-2" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Navigation Link -->
<div class="mt-lg flex justify-center">
<a class="group flex items-center gap-2 font-label-md text-label-md text-on-surface-variant hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
<span>Back to Login</span>
</a>
</div>
</div>
<!-- Footer Security Note -->
<div class="mt-md text-center">
<p class="font-label-sm text-label-sm text-gray-600 uppercase tracking-widest">
        Secure Encryption Enabled
      </p>
</div>
</main>
<!-- Decorative Visual Element (Music Visualizer style) -->
<div class="fixed bottom-0 left-0 w-full h-1 flex items-end gap-1 px-2 opacity-20">
<div class="flex-1 bg-red-600 h-2"></div>
<div class="flex-1 bg-red-600 h-8"></div>

<div class="flex-1 bg-red-600 h-18"></div>
