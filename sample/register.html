<style>
    body {
      background-color: #0A0A0A;
      color: #e5e2e1;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .primary-red-button {
      background-color: #FF0000;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .primary-red-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
    }
    .glass-card {
      background: rgba(18, 18, 18, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 0, 0, 0.1);
    }
    .input-glow:focus-within {
      border-color: #FF0000;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
    }
  </style>
</head>
<body class="font-body-md text-body-md min-h-screen flex items-center justify-center p-md overflow-hidden relative">
<div class="absolute inset-0 z-0">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-[#FF0000]/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-[#FF0000]/5 blur-[120px] rounded-full"></div>
<img class="w-full h-full object-cover opacity-20 mix-blend-overlay" data-alt="Cinematic wide shot of a crowded concert at night with dramatic red stage lighting and silhouettes of hands raised in the air" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAkeATqBxE37ZhWAdUrPnNH8hm6V8_ArmWV16q6U_STSRW_tjaDrguVZUlwOFo-aLeaquEy50-mQ-Cjt3hYvXWSKaejUpRCMlAEtA0kwCmJaDw9N8d5Stndn-3MWxsqiNm2i9menfft3qSnyeFii6uMgAjtWs95b46nMQzzOaAeGjUKmRN6Kc-X0HW1pqwVK8vFy1AK8rJzSwFFC27jToYZzQffduguHCgq8w0u1099NNGX6r4YFOOiJVRa41mtBaxUx1cKo-kcG80"/>
</div>
<main class="relative z-10 w-full max-w-lg">
<div class="text-center mb-lg">
<div class="inline-flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-[#FF0000] text-[48px]" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
<h1 class="font-headline-lg text-display-lg italic ml-sm tracking-tighter text-[#FF0000]">VIBE</h1>
</div>
</div>
<div class="glass-card rounded-xl p-lg shadow-2xl">
<div class="mb-lg">
<h2 class="font-headline-lg text-headline-lg mb-xs">Create Your Account</h2>
<p class="font-body-md text-secondary opacity-70">Join the stream and live the sound.</p>
</div>
<form action="#" class="space-y-md">
<div class="space-y-xs">
<label class="font-label-md text-label-md text-secondary ml-xs" for="name">Full Name</label>
<div class="relative flex items-center input-glow transition-all duration-200 bg-[#1A1A1A] rounded-lg border border-transparent">
<span class="material-symbols-outlined absolute left-md text-secondary opacity-50">person</span>
<input class="w-full bg-transparent border-none focus:ring-0 py-md pl-[52px] pr-md text-on-surface placeholder:text-secondary/30 rounded-lg" id="name" placeholder="John Doe" type="text"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-md text-label-md text-secondary ml-xs" for="email">Email Address</label>
<div class="relative flex items-center input-glow transition-all duration-200 bg-[#1A1A1A] rounded-lg border border-transparent">
<span class="material-symbols-outlined absolute left-md text-secondary opacity-50">mail</span>
<input class="w-full bg-transparent border-none focus:ring-0 py-md pl-[52px] pr-md text-on-surface placeholder:text-secondary/30 rounded-lg" id="email" placeholder="name@vibe.com" type="email"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="space-y-xs">
<label class="font-label-md text-label-md text-secondary ml-xs" for="password">Password</label>
<div class="relative flex items-center input-glow transition-all duration-200 bg-[#1A1A1A] rounded-lg border border-transparent">
<span class="material-symbols-outlined absolute left-md text-secondary opacity-50">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 py-md pl-[52px] pr-md text-on-surface placeholder:text-secondary/30 rounded-lg" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-md text-label-md text-secondary ml-xs" for="password_confirmation">Confirm</label>
<div class="relative flex items-center input-glow transition-all duration-200 bg-[#1A1A1A] rounded-lg border border-transparent">
<span class="material-symbols-outlined absolute left-md text-secondary opacity-50">shield</span>
<input class="w-full bg-transparent border-none focus:ring-0 py-md pl-[52px] pr-md text-on-surface placeholder:text-secondary/30 rounded-lg" id="password_confirmation" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<div class="flex items-start gap-sm pt-xs">
<div class="flex items-center h-5">
<input class="w-5 h-5 rounded border-[#1A1A1A] bg-[#1A1A1A] text-[#FF0000] focus:ring-[#FF0000] focus:ring-offset-0" id="terms" name="terms" type="checkbox"/>
</div>
<div class="text-sm">
<label class="font-body-md text-label-md text-secondary" for="terms">
              I agree to the <a class="text-[#FF0000] hover:underline" href="#">Terms and Conditions</a> and Privacy Policy.
            </label>
</div>
</div>
<button class="primary-red-button w-full py-md rounded-full text-white font-headline-md text-label-md uppercase tracking-widest mt-md" type="submit">
          Create Account
        </button>
</form>
<div class="mt-lg text-center pt-md border-t border-[#1A1A1A]">
<p class="font-body-md text-secondary">
          Already a member? 
          <a class="text-[#FF0000] font-bold hover:underline ml-xs transition-colors" href="#">Login</a>
</p>
</div>
</div>
<div class="mt-lg flex justify-center gap-lg opacity-40">
<span class="material-symbols-outlined text-[32px]">album</span>
<span class="material-symbols-outlined text-[32px]">music_note</span>
<span class="material-symbols-outlined text-[32px]">podcasts</span>
<span class="material-symbols-outlined text-[32px]">radio</span>
</div>
</main>
<footer class="fixed bottom-md w-full text-center z-10 pointer-events-none">
<p class="font-label-sm text-secondary opacity-30 uppercase tracking-[0.2em]">Designed for Audio Purists © 2024 VIBE</p>
</footer>
</body></html>
