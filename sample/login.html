<body class="bg-vibe-mesh font-body-md text-on-surface selection:bg-vibe-red/30">
<main class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Aesthetic background elements -->
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-vibe-red/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-vibe-red/5 rounded-full blur-[100px]"></div>
<div class="w-full max-w-[480px] z-10">
<!-- Brand Logo from JSON Identity -->

<span class="font-display-lg italic text-vibe-red tracking-tighter mb-1">VIBE</span>
<span class="font-label-sm uppercase tracking-[0.3em] text-gray-500">Live the Sound</span>
</div>
<!-- Login Card -->
<div class="vibe-glass p-10 rounded-xl shadow-2xl relative">
<div class="mb-8">
<h1 class="font-headline-lg text-white mb-2">Welcome Back</h1>
<p class="font-body-md text-gray-400">Enter your credentials to access your library.</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-gray-300 block" for="email">Email Address</label>
<div class="relative vibe-input-shadow transition-all duration-300 rounded-lg">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">mail</span>
<input class="w-full bg-surface-container-low border-none rounded-lg py-4 pl-12 pr-4 text-white focus:ring-1 focus:ring-vibe-red font-body-md placeholder:text-gray-600 transition-colors" id="email" placeholder="name@vibe.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-gray-300 block" for="password">Password</label>
<a class="font-label-sm text-vibe-red hover:text-red-400 transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative vibe-input-shadow transition-all duration-300 rounded-lg">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">lock</span>
<input class="w-full bg-surface-container-low border-none rounded-lg py-4 pl-12 pr-4 text-white focus:ring-1 focus:ring-vibe-red font-body-md placeholder:text-gray-600 transition-colors" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-vibe-red hover:bg-red-700 text-white font-headline-md py-4 rounded-full transition-all duration-300 hover:scale-[1.02] active:scale-95 shadow-[0_4px_20px_rgba(255,0,0,0.3)] mt-2" type="submit">
                        Login
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/10"></div>
</div>
<div class="relative flex justify-center text-sm uppercase">
<span class="bg-[#121212] px-4 text-gray-500 font-label-sm">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-surface-container-high border border-white/5 py-3 rounded-xl hover:bg-surface-variant transition-all duration-200">

</div>
<!-- Sign Up Link -->
<div class="mt-10 text-center">
<p class="font-body-md text-gray-400">
                        New to the sound? 
                        <a class="text-vibe-red font-bold hover:underline underline-offset-4 ml-1" href="#">Sign Up</a>
</p>
</div>
</div>

<div class="mt-12 flex justify-center gap-8 items-center opacity-30">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
<span class="font-label-sm">Secure Stream</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">equalizer</span>

</div>
